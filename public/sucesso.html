<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedido confirmado — Peregrino</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #1B2616;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
      color: #E8E4D9;
      padding: 2rem;
    }
    .card {
      max-width: 480px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    .icon { font-size: 3rem; }
    h1 { font-size: 1.75rem; font-style: italic; font-weight: normal; }
    p { font-family: sans-serif; font-size: 0.95rem; color: #E8E4D9aa; line-height: 1.6; }
    a {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      border: 1px solid #E8E4D9aa;
      border-radius: 2rem;
      color: #E8E4D9;
      text-decoration: none;
      font-family: sans-serif;
      font-size: 0.875rem;
      letter-spacing: 0.05em;
      transition: background 0.2s;
    }
    a:hover { background: #E8E4D9; color: #1B2616; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🌿</div>
    <h1>Pedido confirmado!</h1>
    <p>
      Obrigado pela sua encomenda. Você receberá um e-mail de confirmação em breve.<br /><br />
      Seu Coffee Table Book está sendo preparado com toda a sua jornada no Caminho de Santiago.
    </p>
    <a href="/">Voltar ao início</a>
  </div>
</body>
</html>
